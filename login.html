<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elevate</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%23C9A44C' d='M256 32L0 480h512L256 32z'/></svg>">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(rgba(15, 42, 29, 0.8), rgba(15, 42, 29, 0.8)), url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?ixlib=rb-4.0.3') center/cover;">

    <div style="background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 12px; box-shadow: var(--shadow-lg); overflow: hidden;">
        
        <!-- Header -->
        <div style="padding: 2rem 2rem 1.5rem; text-align: center; border-bottom: 1px solid var(--border-color);">
            <a href="index.html" class="nav-brand" style="font-size: 2rem;"><i class="fa-solid fa-mountain" style="color: var(--secondary); margin-right: 0.5rem;"></i>Elevate</a>
            <p style="color: var(--text-light); margin-top: 0.5rem; margin-bottom: 0;">Corporate Dashboard Login</p>
        </div>

        <!-- Form -->
        <div style="padding: 2rem;">
            <form action="dashboard-user.html">
                <div class="form-group">
                    <label class="form-label">Corporate Email Address</label>
                    <input type="email" class="form-control" required placeholder="name@company.com">
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label class="form-label" style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: 0.85rem; color: var(--secondary);">Forgot Password?</a>
                    </div>
                    <input type="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="remember" style="width: 16px; height: 16px;">
                    <label for="remember" style="font-size: 0.875rem; color: var(--text-light);">Stay logged in for 30 days</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Access Dashboard</button>
                
                <div style="text-align: center; margin-top: 1.5rem;">
                    <button type="button" onclick="window.location.href='dashboard-admin.html';" class="btn" style="background: transparent; color: var(--text-light); text-decoration: underline; font-size: 0.85rem; padding: 0;">Login as Admin (Demo Demo)</button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div style="padding: 1.5rem 2rem; background: rgba(0,0,0,0.02); border-top: 1px solid var(--border-color); text-align: center;">
            <p style="font-size: 0.875rem; color: var(--text-light); margin: 0;">Don't have a corporate account? <br><a href="contact.html" style="font-weight: 600;">Contact us to build a package.</a></p>
        </div>

    </div>

    <!-- Toggles (floating for this page) -->
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 1rem;">
        <button id="theme-toggle" aria-label="Toggle Dark Mode" style="background: rgba(255,255,255,0.2); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer;"><i class="fa-solid fa-moon"></i></button>
        <button id="rtl-toggle" aria-label="Toggle RTL" style="background: rgba(255,255,255,0.2); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer;"><i class="fa-solid fa-language"></i></button>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>

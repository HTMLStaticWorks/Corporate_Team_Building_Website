<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Elevate</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; background: linear-gradient(rgba(15, 42, 29, 0.9), rgba(15, 42, 29, 0.9)), url('https://images.unsplash.com/photo-1542744173-8e7e53415bb0?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover; color: var(--accent);">

    <!-- ======== NAVBAR ======== -->
    <header class="navbar" style="background: transparent; box-shadow: none;">
        <div class="container">
            <a href="index.html" class="nav-brand" style="color: var(--secondary);">Elevate<span style="color: var(--accent)">.</span></a>
        </div>
    </header>

    <!-- ======== COMING SOON CONTENT ======== -->
    <section class="section" style="flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center;">
        <div class="container">
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--accent); font-size: clamp(3rem, 6vw, 5rem); margin-bottom: 1.5rem;">New Adventures <br><span style="color: var(--secondary); font-style: italic;">Incoming.</span></h1>
                <p style="font-size: 1.25rem; color: rgba(245, 242, 232, 0.8); margin-bottom: 2.5rem;">We are currently scaling our operations and designing new bespoke corporate retreat packages. Leave your email to get notified when we launch our new tier.</p>
                
                <form action="#" style="display: flex; max-width: 500px; margin: 0 auto; gap: 0.5rem; flex-wrap: wrap;">
                    <input type="email" class="form-control" placeholder="corporate@email.com" required style="flex-grow: 1; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: var(--accent);">
                    <button type="submit" class="btn btn-secondary">Notify Me</button>
                </form>
                
                <div style="margin-top: 4rem; display: flex; gap: 1.5rem; justify-content: center; font-size: 1.5rem;">
                    <a href="#" style="color: var(--accent);"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="#" style="color: var(--accent);"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </div>
        </div>
    </section>

</body>
</html>

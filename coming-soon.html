<body style="display: flex; flex-direction: column; min-height: 100vh; background: linear-gradient(rgba(15, 42, 29, 0.9), rgba(15, 42, 29, 0.9)), url('https://images.unsplash.com/photo-1542744173-8e7e53415bb0?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover; color: var(--accent);">

    <!-- ======== NAVBAR ======== -->
    <header class="navbar" style="background: transparent; box-shadow: none;">
        <div class="container">
            <a href="index.html" class="nav-brand" style="color: var(--secondary);"><i class="fa-solid fa-mountain" style="color: var(--secondary); margin-right: 0.5rem;"></i>Elevate</a>

    <!-- ======== COMING SOON CONTENT ======== -->
    <section class="section" style="flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center;">

            <div style="max-width: 700px; margin: 0 auto;">

                <form action="#" style="display: flex; max-width: 500px; margin: 0 auto; gap: 0.5rem; flex-wrap: wrap;">
                    <input type="email" class="form-control" placeholder="corporate@email.com" required style="flex-grow: 1; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: var(--accent);">

                </form>
                
                <div style="margin-top: 4rem; display: flex; gap: 1.5rem; justify-content: center; font-size: 1.5rem;">

                    <a href="#" style="color: var(--accent);"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" style="color: var(--accent);"><i class="fa-brands fa-facebook-f"></i></a>
